<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4E3606" />
      <stop offset="30%" stop-color="#A27D23" />
      <stop offset="50%" stop-color="#FFE79A" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#3D2905" />
    </linearGradient>
    <linearGradient id="gold-bevel" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFF8D6" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#7B5C0D" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E79F" />
      <stop offset="50%" stop-color="#F39C12" />
      <stop offset="100%" stop-color="#D35400" />
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA800" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFA800" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="shieldBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D2214" />
      <stop offset="100%" stop-color="#0E0803" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.8" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Medallion Shield -->
    <circle cx="200" cy="200" r="170" fill="url(#shieldBg)" stroke="url(#gold-base)" stroke-width="8" />
    <circle cx="200" cy="200" r="160" fill="url(#goldGlow)" />
    <circle cx="200" cy="200" r="150" fill="none" stroke="url(#gold-bevel)" stroke-width="2" stroke-dasharray="10,8" />
    <circle cx="200" cy="200" r="140" fill="none" stroke="url(#gold-base)" stroke-width="3" />

    <!-- Eagle Wings (Background) -->
    <path d="M80 160 L120 100 L180 130 L200 80 L220 130 L280 100 L320 160 Z" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="4" stroke-linejoin="round" />
    <path d="M90 152 L120 108 L180 135 L200 90 L220 135 L280 108 L310 152 Z" fill="url(#gold-bevel)" opacity="0.3" stroke="none" />

    <!-- Eagle Head (Front View) -->
    <path d="M160 160 Q150 110 200 100 Q250 110 240 160 L230 200 L170 200 Z" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="4" stroke-linejoin="round" />
    <!-- Sharp Beak -->
    <path d="M185 155 L200 120 L215 155 Q200 180 185 155 Z" fill="url(#gold-bevel)" stroke="url(#gold-base)" stroke-width="2" />

    <!-- Glowing Yellow Eyes -->
    <polygon points="172,138 185,142 176,145" fill="#F1C40F" stroke="url(#gold-bevel)" stroke-width="1.5" />
    <polygon points="228,138 215,142 224,145" fill="#F1C40F" stroke="url(#gold-bevel)" stroke-width="1.5" />

    <!-- Rising Chart Line (Green) representing Momentum -->
    <path d="M90 280 L160 210 L230 240 L310 160" fill="none" stroke="#2ECC71" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <polygon points="310,160 294,160 306,172" fill="#2ECC71" />

    <!-- Amber Topaz Gem on Forehead -->
    <rect x="188" y="73" width="24" height="24" rx="4" fill="url(#amber)" stroke="url(#gold-bevel)" stroke-width="3" transform="rotate(45 200 85)" />
  </g>
</svg>
