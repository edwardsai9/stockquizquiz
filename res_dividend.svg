<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4E3606" />
      <stop offset="30%" stop-color="#A27D23" />
      <stop offset="50%" stop-color="#FFE79A" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#3D2905" />
    </linearGradient>
    <linearGradient id="gold-bevel" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFF8D6" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#7B5C0D" />
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58D68D" />
      <stop offset="50%" stop-color="#2ECC71" />
      <stop offset="100%" stop-color="#145A32" />
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA800" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFA800" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="shieldBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D2214" />
      <stop offset="100%" stop-color="#0E0803" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.8" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Medallion Shield -->
    <circle cx="200" cy="200" r="170" fill="url(#shieldBg)" stroke="url(#gold-base)" stroke-width="8" />
    <circle cx="200" cy="200" r="160" fill="url(#goldGlow)" />
    <circle cx="200" cy="200" r="150" fill="none" stroke="url(#gold-bevel)" stroke-width="2" stroke-dasharray="10,8" />
    <circle cx="200" cy="200" r="140" fill="none" stroke="url(#gold-base)" stroke-width="3" />

    <!-- 3D Alpaca Head and Neck -->
    <path d="M170 300 L170 190 Q170 135 200 135 Q230 135 230 190 L230 300" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="5" stroke-linejoin="round" />
    <path d="M176 295 L176 190 Q176 142 200 142 Q224 142 224 190 L224 295" fill="url(#gold-bevel)" opacity="0.3" />
    
    <!-- Ears -->
    <path d="M175 145 L155 85 Q168 80 183 130" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="4" stroke-linejoin="round" />
    <path d="M225 145 L245 90 Q232 80 217 130" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="4" stroke-linejoin="round" />

    <!-- Snout & Big Happy Smile -->
    <ellipse cx="200" cy="185" rx="22" ry="18" fill="#140F08" stroke="url(#gold-bevel)" stroke-width="3" />
    <path d="M200 188 L200 198 M192 196 Q200 202 208 196" fill="none" stroke="url(#gold-bevel)" stroke-width="3" stroke-linecap="round" />

    <!-- Closed happy eyes (glowing gold arches) -->
    <path d="M172 165 Q182 155 190 165" fill="none" stroke="url(#gold-bevel)" stroke-width="4" stroke-linecap="round" />
    <path d="M210 165 Q218 155 226 165" fill="none" stroke="url(#gold-bevel)" stroke-width="4" stroke-linecap="round" />

    <!-- Aztec Collar with Emerald Pendant -->
    <path d="M165 235 L235 235 L225 248 L175 248 Z" fill="url(#gold-base)" stroke="url(#gold-bevel)" stroke-width="2" />
    <rect x="188" y="228" width="24" height="24" rx="4" fill="url(#emerald)" stroke="url(#gold-bevel)" stroke-width="3" transform="rotate(45 200 240)" />

    <!-- Gold Coins hanging on neck -->
    <circle cx="160" cy="235" r="8" fill="url(#gold-bevel)" />
    <circle cx="240" cy="235" r="8" fill="url(#gold-bevel)" />
  </g>
</svg>
